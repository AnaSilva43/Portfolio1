<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Trabalhos</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #474747;
        }

        .navbar {
            background-color: black;
            padding: 15px;
            border-radius: 0 0 15px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #a8e6cf;
            transform: translateY(-5px);
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            color: white;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .dropbtn:hover {
            color: #a8e6cf;
            transform: translateY(-5px);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #333;
            min-width: 160px;
            border-radius: 8px;
        }

        .dropdown-content a {
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            text-align: left;
        }

        .dropdown-content a:hover {
            background-color: #555;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .content {
            margin-top: 10px;
        }

        h1 {
            font-size: 50px;
            color: rgb(255, 255, 255);
        }

        /* GALERIA */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
        }

        .gallery img {
            width: 80%;
            border-radius: 15px;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Barra -->
    <div class="navbar">
        <div class="nav-links">
            <a href="index.html">Início</a>
        </div>

        <div class="dropdown">
            <button class="dropbtn">Menu</button>
            <div class="dropdown-content">
                <a href="cv.html">CV</a>
                <a href="trabalhos.html">Trabalhos</a>
            </div>
        </div>
    </div>

    <!-- Título -->
    <div class="content">
        <h1>Trabalhos</h1>
    </div>

    <!--imagens -->
    <div class="gallery">
        <img src="imagens/1.jpeg" >
        <img src="imagens/2.jpeg" >
        <img src="imagens/3.jpeg" >
        <img src="imagens/4.jpeg" >
        <img src="imagens/5.jpeg" >
        <img src="imagens/6.png" >
        <img src="imagens/7.png" >

    </div>

</body>
</html>
